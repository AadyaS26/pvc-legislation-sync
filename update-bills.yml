name: Update bills.json

on:
  schedule:
    - cron: "0 13 * * *"   # every day at 1pm UTC (5am/6am Pacific depending on DST)
  workflow_dispatch:        # lets you also trigger it manually from the Actions tab

permissions:
  contents: write

jobs:
  update-bills:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install httpx

      - name: Fetch latest bills from Congress.gov
        env:
          CONGRESS_API_KEY: ${{ secrets.CONGRESS_API_KEY }}
        run: python fetch_bills.py

      - name: Commit updated bills.json
        run: |
          git config user.name "PVC Bill Bot"
          git config user.email "actions@github.com"
          git add bills.json
          git diff --staged --quiet || git commit -m "Auto-update bills.json"
          git push
